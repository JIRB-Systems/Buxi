<ion-header class="ion-no-border">
  <ion-toolbar class="routes-toolbar">
    <ion-title>Rutas</ion-title>
  </ion-toolbar>
  <div class="search-wrapper">
    <ion-searchbar
      placeholder="Buscar ruta, origen o destino..."
      debounce="300"
      (ionInput)="onSearch($event)"
      class="custom-searchbar"
    ></ion-searchbar>
  </div>
</ion-header>

<ion-content class="routes-content">
  <div class="routes-container">

    <div *ngIf="loading" class="loading-state">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
    </div>

    <div *ngIf="!loading && filteredRutas.length === 0" class="empty-state">
      <ion-icon name="map-outline"></ion-icon>
      <h3 *ngIf="searchText">No se encontraron rutas</h3>
      <h3 *ngIf="!searchText">No hay rutas disponibles</h3>
      <p *ngIf="searchText">Intenta con otro término de búsqueda</p>
      <p *ngIf="!searchText">Las rutas aparecerán aquí cuando estén configuradas</p>
    </div>

    <div class="route-card" *ngFor="let ruta of filteredRutas" (click)="openRoute(ruta)">
      <div class="route-color" [style.background]="ruta.color"></div>
      <div class="route-info">
        <h3>{{ ruta.nombre }}</h3>
        <div class="route-path">
          <div class="path-point">
            <div class="dot origin"></div>
            <span>{{ ruta.origen }}</span>
          </div>
          <div class="path-line"></div>
          <div class="path-point">
            <div class="dot destination"></div>
            <span>{{ ruta.destino }}</span>
          </div>
        </div>
        <p class="route-empresa" *ngIf="ruta.empresa">
          <ion-icon name="business-outline"></ion-icon>
          {{ $any(ruta.empresa)?.nombre }}
        </p>
      </div>
      <ion-icon name="chevron-forward-outline" class="card-arrow"></ion-icon>
    </div>

  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <div class="tab-bar">
    <div class="tab-item" routerLink="/passenger/home">
      <ion-icon name="home-outline"></ion-icon>
      <span>Inicio</span>
    </div>
    <div class="tab-item" routerLink="/passenger/map">
      <ion-icon name="map-outline"></ion-icon>
      <span>Mapa</span>
    </div>
    <div class="tab-item active">
      <ion-icon name="search"></ion-icon>
      <span>Rutas</span>
    </div>
    <div class="tab-item" routerLink="/passenger/profile">
      <ion-icon name="person-outline"></ion-icon>
      <span>Perfil</span>
    </div>
  </div>
</ion-footer>
