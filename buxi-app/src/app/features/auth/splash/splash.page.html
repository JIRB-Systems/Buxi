<ion-content class="splash-content" [fullscreen]="true">
  <div class="splash-center">
    <div class="halo" #halo></div>

    <div class="lockup">
      <svg class="arrow" viewBox="0 0 400 140" aria-hidden="true">
        <path class="shaft" #shaft d="M40 70 L300 70" />
        <polygon class="head" #head points="296,36 382,70 296,104" />
        <circle class="dot" #dot cx="40" cy="70" r="11" />
      </svg>

      <div class="wordmark" aria-label="BUXI">
        <span #letter>B</span><span #letter>U</span><span #letter>X</span><span #letter>I</span>
      </div>

      <div class="tagline" #tagline>Tus buses en tiempo real</div>
    </div>
  </div>
</ion-content>
