<ion-content [fullscreen]="true" class="reg-content" [scrollY]="true">
  <div class="reg-wrapper">

    <div class="reg-top">
      <ion-button fill="clear" routerLink="/auth/login" class="back-btn">
        <ion-icon name="chevron-back" slot="icon-only"></ion-icon>
      </ion-button>
      <h2>Crear cuenta</h2>
      <p>Únete para ver tus buses en vivo</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="reg-form">

      <div class="field">
        <label>Nombre completo</label>
        <div class="input-wrap">
          <ion-input formControlName="nombre_completo" placeholder="Tu nombre"></ion-input>
        </div>
        <span class="err" *ngIf="registerForm.get('nombre_completo')?.touched && registerForm.get('nombre_completo')?.hasError('required')">Obligatorio</span>
      </div>

      <div class="field">
        <label>Correo electrónico</label>
        <div class="input-wrap">
          <ion-input formControlName="email" type="email" placeholder="tucorreo@ejemplo.com"></ion-input>
        </div>
        <span class="err" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.hasError('email')">Correo no válido</span>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Contraseña</label>
          <div class="input-wrap">
            <ion-input formControlName="password" [type]="showPassword ? 'text' : 'password'" placeholder="6+ caracteres"></ion-input>
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" class="eye" (click)="togglePassword()"></ion-icon>
          </div>
        </div>
        <div class="field">
          <label>Confirmar</label>
          <div class="input-wrap">
            <ion-input formControlName="confirmPassword" [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Repetir"></ion-input>
          </div>
        </div>
      </div>
      <span class="err" *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.hasError('passwordMismatch')">No coinciden</span>

      <div class="row-2">
        <div class="field">
          <label>Teléfono <span class="opt">(opcional)</span></label>
          <div class="input-wrap">
            <ion-input formControlName="telefono" type="tel" placeholder="8888-8888"></ion-input>
          </div>
        </div>
        <div class="field">
          <label>Provincia <span class="opt">(opcional)</span></label>
          <div class="input-wrap select-wrap">
            <ion-select formControlName="provincia" placeholder="Elegir" interface="action-sheet">
              <ion-select-option *ngFor="let p of provincias" [value]="p">{{ p }}</ion-select-option>
            </ion-select>
          </div>
        </div>
      </div>

      <div class="terms">
        <ion-checkbox [(ngModel)]="acceptTerms" [ngModelOptions]="{standalone: true}"></ion-checkbox>
        <span>Acepto los <a href="#">Términos</a> y <a href="#">Privacidad</a></span>
      </div>

      <ion-button expand="block" type="submit" class="btn-main" [disabled]="registerForm.invalid || !acceptTerms">
        Crear cuenta
      </ion-button>

      <p class="login-link">¿Ya tienes cuenta? <a routerLink="/auth/login">Entrar</a></p>
    </form>
  </div>
</ion-content>
