<ion-content [fullscreen]="true" class="login-content" [scrollY]="true">
  <div class="login-wrapper">

    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="white" width="30" height="30"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/></svg>
      </div>
      <h1>Buxi</h1>
      <p>Tus buses en tiempo real</p>
    </div>

    <div class="form-card">
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="field" [class.has-error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          <label>Correo</label>
          <div class="input-wrap">
            <ion-input formControlName="email" type="email" placeholder="tucorreo@ejemplo.com"></ion-input>
          </div>
          <span class="err" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">Correo no válido</span>
        </div>

        <div class="field" [class.has-error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          <div class="label-row">
            <label>Contraseña</label>
            <a routerLink="/auth/forgot-password" class="forgot">¿Olvidaste?</a>
          </div>
          <div class="input-wrap">
            <ion-input formControlName="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••"></ion-input>
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" class="eye" (click)="togglePassword()"></ion-icon>
          </div>
          <span class="err" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('minlength')">Mínimo 6 caracteres</span>
        </div>

        <ion-button expand="block" type="submit" class="btn-main" [disabled]="loginForm.invalid">Entrar</ion-button>
      </form>

      <div class="sep"><div class="sep-line"></div><span>o</span><div class="sep-line"></div></div>

      <div class="social-row">
        <ion-button fill="outline" class="btn-social" (click)="onGoogleLogin()">
          <ion-icon name="logo-google" slot="start"></ion-icon>Google
        </ion-button>
        <ion-button fill="outline" class="btn-social" (click)="onFacebookLogin()">
          <ion-icon name="logo-facebook" slot="start"></ion-icon>Facebook
        </ion-button>
      </div>
    </div>

    <p class="bottom-text">¿Primera vez? <a routerLink="/auth/register">Crear cuenta</a></p>
    <a routerLink="/auth/login" class="empresa-link">Acceso para empresas de transporte</a>
  </div>
</ion-content>
