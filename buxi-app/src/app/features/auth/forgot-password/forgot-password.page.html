<ion-content [fullscreen]="true" class="fp-content">
  <div class="fp-wrapper">

    <ion-button fill="clear" routerLink="/auth/login" class="back-btn">
      <ion-icon name="chevron-back" slot="icon-only"></ion-icon>
    </ion-button>

    <div *ngIf="!emailSent" class="fp-body">
      <div class="fp-icon">
        <ion-icon name="key-outline"></ion-icon>
      </div>
      <h2>¿Olvidaste tu contraseña?</h2>
      <p>Te enviaremos un enlace para restablecerla.</p>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div class="field">
          <div class="input-wrap">
            <ion-input formControlName="email" type="email" placeholder="Tu correo electrónico"></ion-input>
          </div>
          <span class="err" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.hasError('email')">Correo no válido</span>
        </div>
        <ion-button expand="block" type="submit" class="btn-main" [disabled]="forgotForm.invalid">
          Enviar enlace
        </ion-button>
      </form>
    </div>

    <div *ngIf="emailSent" class="fp-body sent">
      <div class="fp-icon ok">
        <ion-icon name="checkmark-outline"></ion-icon>
      </div>
      <h2>¡Revisa tu correo!</h2>
      <p>Enviamos un enlace de recuperación a tu bandeja de entrada.</p>
      <ion-button expand="block" class="btn-main" (click)="backToLogin()">Volver al login</ion-button>
    </div>

  </div>
</ion-content>
